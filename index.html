<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zoitsui-design.com</title>
    
</head>
<body>
    <div class="box page-title">網頁標題</div>
    <div class="box pagination-top">分頁按鈕</div>
    <div class="box instagram-btn">Instagram 按鈕</div>

    <div class="box center-image">圖片置中全屏</div>

    <div class="box pagination-bottom">分頁按鈕</div>
    <div class="box text-block">文字段落</div>
    <div class="box hongkong-time" id="hk-time">香港日期和時間</div>

    <script>
        // 自动显示香港时间
        function updateHongKongTime() {
            const options = {
                timeZone: 'Asia/Hong_Kong',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            };
            const timeStr = new Date().toLocaleString('zh-HK', options);
            document.getElementById('hk-time').textContent = timeStr;
        }

        updateHongKongTime();
        setInterval(updateHongKongTime, 1000);
    </script>
</body>
</html>
